services:
  memberkitsync:
    build:
      context: ./memberkitsync
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: "3001"
    depends_on:
      - memberkitsync
    restart: unless-stopped
