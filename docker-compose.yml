services:
  memberkitsync:
    build:
      context: ./memberkitsync
      dockerfile: Dockerfile
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      # env_file sobrescreveria PORT=3000 (do backend), forçamos 3001 aqui
      PORT: "3001"
    depends_on:
      - memberkitsync
    restart: unless-stopped
